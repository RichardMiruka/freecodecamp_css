<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID vs Class Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Unique header using an ID -->
  <header id="main-header">
    <h1>My Website</h1>
    <p>Welcome to a demo of ID vs Class in HTML & CSS</p>
  </header>

  <!-- Multiple cards using a reusable class -->
  <section class="card-container">
    <div class="card">
      <h2>Card 1</h2>
      <p>This card is styled using a class.</p>
    </div>

    <div class="card">
      <h2>Card 2</h2>
      <p>All cards share the same class styling.</p>
    </div>

    <div class="card">
      <h2>Card 3</h2>
      <p>You can reuse the class as many times as needed.</p>
    </div>
  </section>

</body>
</html>
