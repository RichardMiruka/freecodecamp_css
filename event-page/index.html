<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Flyer</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <header>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/event.jpg" alt="Event Banner">
